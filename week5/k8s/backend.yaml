apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-backend
  labels:
    app: ai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-backend
  template:
    metadata:
      labels:
        app: ai-backend
    spec:
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: ai-backend
          image: IMAGE_BACKEND  # replaced by CI/CD with the real tag
          ports:
            - containerPort: 8000
          env:
            - name: LLM_BACKEND
              value: "vllm"
            - name: LLM_BASE_URL
              value: "http://vllm:8000"
            - name: LLM_MODEL
              value: "meta-llama/Meta-Llama-3.1-8B-Instruct"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: ai-backend
spec:
  selector:
    app: ai-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
